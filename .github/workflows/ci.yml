name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ledgercore_test
          POSTGRES_USER: ledger
          POSTGRES_PASSWORD: ledger
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ledger -d ledgercore_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run tests
        env:
          DB_USERNAME: ledger
          DB_PASSWORD: ledger
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ledgercore_test
          SPRING_DATASOURCE_USERNAME: ledger
          SPRING_DATASOURCE_PASSWORD: ledger
          REDIS_HOST: localhost
          JWT_SECRET: ci-test-secret-key-at-least-32-characters-long
        run: ./mvnw test -B
