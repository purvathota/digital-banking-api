spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ledgercore
    username: ${DB_USERNAME:ledger}
    password: ${DB_PASSWORD:ledger}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis

jwt:
  secret: ${JWT_SECRET:change-me-in-production-use-at-least-32-chars-here}
  expiration: 3600

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

server:
  port: 8080

logging:
  level:
    com.ledgercore: INFO
    org.springframework.security: WARN
